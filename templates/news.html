<!DOCTYPE html>
<html>
<head>
    <title>News</title>
    <style>
    body {
        font-family: Arial;
        background: #0f172a;
        color: white;
    }

    h1 {
    text-align: center;
    }

    .container {
        width: 80%;
        margin: auto;
    }

    .card {
        background: #1e293b;
        padding: 15px;
        margin: 20px 0;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card h3 {
        margin-bottom: 5px;
    }

    .card p {
    color: #cbd5f5;
    }

    .card:hover {
        transform: scale(1.02);
        transition: 0.3s;
    }
    
    button {
        background: #3b82f6;
        color: white;
        padding: 8px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
    background: darkblue;
    }

    button:disabled {
    background: gray;
    }
    
    .summary-box {
        background: #020617;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
        border-left: 4px solid #3b82f6;
    }

    </style>
</head>
<body>

    <div class="container">
    

    <h1>📰 {{ category.capitalize() }} News</h1>
    

    <div id="summary-box" class="summary-box">
    🧠 Summary will appear here...
    </div>

    {% if summary %}
    <div class="summary-box">
        <h3>🧠 AI Summary</h3>
        <p>{{ summary }}</p>
    </div>
    {% endif %}

    {% if articles|length == 0 %}
    <p style="text-align:center;">No news found 😕</p>
    {% endif %}

    {% for article in articles %}
    <div class="card">
        <h3>{{ article.title }}</h3>
        <p>{{ article.description }}</p>

        <button onclick="getSummary(this, `{{ article.description or article.title }}`)">
        Summarize
        </button>
    </div>

    {% endfor %}

    <div style="text-align:center; margin-top:20px;">
        <a href="/">⬅ Back</a>
    </div>

    <script>
        function getSummary(btn, text) {
            const box = document.getElementById("summary-box");

            // change button text
            btn.innerText = "Loading...";
            btn.disabled = true;

            // show loading message
            box.innerText = "⏳ Generating summary...";

            fetch(`/api/summarize?text=${encodeURIComponent(text)}`)
            .then(response => response.json())
            .then(data => {
                box.innerText = data.summary;

                // restore button
                btn.innerText = "Summarize";
                btn.disabled = false;
            })
            .catch(error => {
                box.innerText = "Error generating summary";

                btn.innerText = "Summarize";
                btn.disabled = false;
            });
        }
    </script>
    </div>
</body>
</html>
